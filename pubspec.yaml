name: mr7_chat
description: MR7 Chat - Advanced AI Chat Platform
publish_to: none
version: 2.0.0+2

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase core
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.5.2
  firebase_storage: ^12.3.8
  firebase_analytics: ^11.3.5
  firebase_messaging: ^15.1.5

  # State management
  provider: ^6.1.2

  # UI & Fonts
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  photo_view: ^0.15.0
  video_player: ^2.9.2
  shimmer: ^3.0.0
  glassmorphism_ui: ^0.3.0
  flutter_staggered_animations: ^1.1.1
  lottie: ^3.1.3
  
  # Media & Recording
  image_picker: ^1.1.2
  record: 6.2.0
  audioplayers: ^6.1.0
  file_picker: ^8.1.4

  # Network
  http: ^1.2.2

  # Storage & Security
  shared_preferences: ^2.3.3
  crypto: ^3.0.5
  uuid: ^4.5.1
  path: ^1.9.0
  path_provider: ^2.1.5

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.1
  permission_handler: ^11.3.1
  
  # AI Integration
  google_generative_ai: ^0.4.6
  
  # Advanced Features
  flutter_local_notifications: ^18.0.1
  emoji_picker_flutter: ^4.4.0
  flutter_markdown: ^0.7.4+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/sounds/
# Force CI Update
dependency_overrides:
  record_android: 1.3.0
